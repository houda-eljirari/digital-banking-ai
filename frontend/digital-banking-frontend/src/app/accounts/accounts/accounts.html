<div class="container mt-3">

  <div class="card">

    <div class="card-header">
      Customer Accounts
    </div>

    <div class="card-body">

      <table class="table">

        <thead>

        <tr>
          <th>ID</th>
          <th>Balance</th>
          <th>Status</th>
          <th>Created At</th>
          <th>Type</th>
        </tr>

        </thead>

        <tbody>

        <tr *ngFor="let account of accounts">

          <td>{{account.id}}</td>

          <td>{{account.balance}}</td>

          <td>{{account.status}}</td>

          <td>{{account.createdAt}}</td>

          <td>{{account.type}}</td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
<div class="card mt-3">

  <div class="card-header">
    Account Operations
  </div>

  <div class="card-body">

    <table class="table">

      <thead>

      <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Amount</th>
        <th>Type</th>
        <th>Description</th>
      </tr>

      </thead>

      <tbody>

      <tr
        *ngFor="let op of accountHistory.accountOperationDTOS">

        <td>{{op.id}}</td>

        <td>{{op.operationDate}}</td>

        <td>{{op.amount}}</td>

        <td>{{op.type}}</td>

        <td>{{op.description}}</td>

      </tr>

      </tbody>

    </table>

  </div>

</div>
